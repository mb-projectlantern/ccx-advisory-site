<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>CCX</title>

<style>
:root {
  --bg: #0f1720;
  --text: #e5e7eb;
  --muted: #9ca3af;
  --line: #334155;

  /* watermark sizing */
  --mark-size: min(380px, 58vw);

  /*
    Internal CCX text in the watermark sits below the image center.
    This offset lifts the watermark so its built-in "CCX" aligns behind the real h1.
    Tweak slightly if needed after final deployment.
  */
  --mark-ccx-offset: calc(var(--mark-size) * 0.292);
}

* {
  box-sizing: border-box;
}

html,
body {
  height: 100%;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
}

.container {
  width: min(760px, 92vw);
  padding: 40px 28px;
  position: relative;
  z-index: 1;
}

.hero {
  position: relative;
  display: inline-block;
  margin-bottom: 22px;
}

h1 {
  position: relative;
  z-index: 2;
  margin: 0;
  font-size: clamp(52px, 8vw, 64px);
  line-height: 1;
  letter-spacing: 12px;
  font-weight: 600;
}

/*
  Watermark is anchored to the hero block so it scales and stays aligned with the title.
  The extra upward shift accounts for where the watermark image's own "CCX" sits internally.
*/
.mark {
  position: absolute;
  left: 50%;
  top: 50%;
  width: var(--mark-size);
  height: auto;
  transform: translate(
    -50%,
    calc(-50% - var(--mark-ccx-offset))
  );
  opacity: 0.055;
  filter: blur(0.3px);
  z-index: 0;
  pointer-events: none;
  user-select: none;
  transition: opacity 0.6s ease;
}

.hero:hover .mark {
  opacity: 0.085;
}

.divider {
  width: 90px;
  height: 1px;
  background: var(--line);
  margin: 0 auto 28px;
  opacity: 0.8;
}

p {
  color: var(--muted);
  line-height: 1.7;
  font-size: 18px;
  margin: 0 0 22px;
}

footer {
  position: fixed;
  left: 0;
  bottom: 20px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  letter-spacing: 1px;
  color: #6b7280;
}

@media (max-width: 640px) {
  :root {
    --mark-size: min(320px, 74vw);
  }

  .container {
    padding: 32px 20px;
  }

  h1 {
    letter-spacing: 10px;
  }

  p {
    font-size: 17px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="hero">
    <img src="ccx-mark.png" class="mark" alt="CCX mark" loading="eager" />
    <h1>CCX</h1>
  </div>

  <div class="divider"></div>

  <p>
    Commercial real estate and construction work requiring clear thinking
    and disciplined execution.
  </p>

  <p>
    Operating quietly. Executing deliberately.
  </p>

</div>

<footer>
  © <span id="year"></span> CCX
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
