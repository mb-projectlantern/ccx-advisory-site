<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>CCX</title>

<style>

body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:#0f1720;
  color:#e5e7eb;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
  overflow:hidden;
}

.container {
  max-width:700px;
  padding:40px;
  position:relative;
  z-index:2;
}

h1 {
  font-size:64px;
  letter-spacing:10px;
  margin-bottom:15px;
  font-weight:600;
}

p {
  color:#9ca3af;
  line-height:1.7;
  font-size:18px;
  margin-bottom:20px;
}

footer {
  position:absolute;
  bottom:20px;
  font-size:12px;
  color:#6b7280;
  width:100%;
  text-align:center;
}

/* subtle chimp watermark */

.mark {
  position:absolute;
  width:500px;
  opacity:0.04;
  right:-100px;
  bottom:-120px;
  z-index:1;
  pointer-events:none;
}

/* slight blue accent line */

.divider {
  width:80px;
  height:2px;
  background:#334155;
  margin:25px auto;
}

</style>
</head>

<body>

<img src="ccx-mark.png" class="mark" alt="CCX mark">

<div class="container">

<h1>CCX</h1>

<div class="divider"></div>

<p>
Commercial real estate and construction work requiring
clear thinking and disciplined execution.
</p>

<p>
Operating quietly. Executing deliberately.
</p>

</div>

<footer>
© <span id="year"></span> CCX
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
